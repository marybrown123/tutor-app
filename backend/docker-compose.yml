version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: tutor-app-postgres
    environment:
      POSTGRES_DB: tutorapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: